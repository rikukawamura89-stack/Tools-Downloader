<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tools Downloader - Riku Edition</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000;
      color: #0f0;
      font-family: 'VT323', monospace;
      height: 100vh;
      overflow: hidden;
      position: relative;
    }

    canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }

    .container {
      position: relative;
      z-index: 10;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    .panel {
      background: rgba(0, 20, 0, 0.75);
      border: 2px solid #0f0;
      border-radius: 12px;
      padding: 40px 60px;
      max-width: 720px;
      box-shadow: 0 0 40px #0f0, inset 0 0 25px #0f0;
      backdrop-filter: blur(6px);
      margin-bottom: 40px;
    }

    h1 { font-size: 4rem; margin-bottom: 15px; text-shadow: 0 0 15px #0f0; letter-spacing: 5px; }
    p.subtitle { font-size: 1.8rem; margin-bottom: 35px; opacity: 0.9; }

    input[type="text"] {
      width: 100%;
      padding: 20px;
      font-size: 1.7rem;
      background: rgba(0, 30, 0, 0.85);
      border: 2px solid #0f0;
      color: #0f0;
      font-family: 'VT323', monospace;
      border-radius: 10px;
      margin-bottom: 30px;
      box-shadow: 0 0 20px #0f0 inset;
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 25px;
    }

    select, button {
      padding: 20px 40px;
      font-size: 1.8rem;
      font-family: 'VT323', monospace;
      border-radius: 10px;
      cursor: pointer;
      border: 2px solid #0f0;
      background: rgba(0, 40, 0, 0.85);
      color: #0f0;
      transition: all 0.3s;
    }

    button {
      background: #0f0;
      color: #000;
      font-weight: bold;
      box-shadow: 0 0 25px #0f0;
    }

    button:hover, select:hover {
      box-shadow: 0 0 40px #0f0;
      transform: scale(1.08);
    }

    #loading { color: #0f0; font-size: 2.2rem; margin: 25px 0; animation: blink 1s infinite; display: none; }
    #result { margin-top: 30px; font-size: 2rem; min-height: 50px; }

    footer {
      position: absolute;
      bottom: 20px;
      width: 100%;
      text-align: center;
      font-size: 1.4rem;
      color: #0a0;
      opacity: 0.7;
      z-index: 10;
    }

    @keyframes blink { 50% { opacity: 0.5; } }
  </style>
</head>
<body>
  <canvas id="matrix"></canvas>

  <div class="container">
    <div class="panel">
      <h1>Tools Downloader</h1>
      <p class="subtitle">Paste link YouTube / TikTok / IG / X di bawah, langsung download!</p>

      <input type="text" id="link" placeholder="https://youtube.com/watch?v=..." autofocus>

      <div class="controls">
        <select id="format">
          <option value="bestvideo+bestaudio/best">MP4 Terbaik (Video + Audio)</option>
          <option value="bestvideo[height<=1080]+bestaudio/best">MP4 1080p</option>
          <option value="bestvideo[height<=720]+bestaudio/best">MP4 720p</option>
          <option value="bestaudio/best">MP3 Audio 320kbps</option>
          <option value="bestaudio[ext=m4a]">M4A Audio</option>
          <option value="bestaudio[ext=ogg]">OGG Audio</option>
        </select>

        <button onclick="download()">Download Sekarang</button>
      </div>

      <div id="loading" class="loading">Memproses request... jangan tutup tab bro 🔥</div>
      <div id="result"></div>
    </div>
  </div>

  <footer>
    © 2026 Riku Kawamura | Tools Downloader 
  </footer>

  <script>
    // Matrix Rain (sama seperti sebelumnya)
    const canvas = document.getElementById('matrix');
    const ctx = canvas.getContext('2d');
    canvas.height = window.innerHeight;
    canvas.width = window.innerWidth;
    const matrixChars = '01アイウエオカキクケコサシスセソタチツテトナニヌネノハヒフヘホマミムメモヤユヨラリルレロワヲン'.split('');
    const fontSize = 16;
    const columns = canvas.width / fontSize;
    const drops = Array(Math.floor(columns)).fill(1);

    function draw() {
      ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = '#0f0';
      ctx.font = fontSize + 'px monospace';
      for (let i = 0; i < drops.length; i++) {
        const text = matrixChars[Math.floor(Math.random() * matrixChars.length)];
        const x = i * fontSize;
        const y = drops[i] * fontSize;
        ctx.fillText(text, x, y);
        if (y > canvas.height && Math.random() > 0.975) drops[i] = 0;
        drops[i]++;
      }
    }
    setInterval(draw, 35);
    window.addEventListener('resize', () => {
      canvas.height = window.innerHeight;
      canvas.width = window.innerWidth;
    });

    // Download function (pakai Cobalt API)
    async function download() {
      const link = document.getElementById('link').value.trim();
      const loading = document.getElementById('loading');
      const result = document.getElementById('result');

      if (!link) {
        alert("Paste link dulu bro!");
        return;
      }

      loading.style.display = 'block';
      result.innerHTML = '';

      try {
        const response = await fetch('https://api.cobalt.tools/api/json', {
          method: 'POST',
          headers: { 'Accept': 'application/json', 'Content-Type': 'application/json' },
          body: JSON.stringify({
            url: link,
            vCodec: 'h264',
            vQuality: '1080',
            aFormat: 'mp3',
            isAudioOnly: false
          })
        });

        const data = await response.json();

        if (data.status === 'success' && data.url) {
          result.innerHTML = `<a href="${data.url}" target="_blank" style="color:#0f0; font-size:2.5rem; text-decoration:underline; text-shadow:0 0 15px #0f0;">
            DOWNLOAD DIMULAI! Klik sini bro 🔥
          </a>`;
        } else {
          result.innerHTML = `<p style="color:#f00;">Gagal: ${data.text || 'Coba link lain / format beda'}</p>`;
        }
      } catch (err) {
        result.innerHTML = `<p style="color:#f00;">Error: ${err.message}. Coba VPN atau refresh halaman.</p>`;
      }

      loading.style.display = 'none';
    }
  </script>
</body>
</html>
